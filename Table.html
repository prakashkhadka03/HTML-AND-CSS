<!DOCTYPE html>
<html>
    <head>
        <title>A SimpleTable</title>
    </head>
    <style>
        table, th, td {
        border:1px solid black;
        }
    </style>
    <body>
        <h2>Marks of Shyam in the mid-term Exam</h2>

<table style="width:100%">
  <tr>
    <th>Subject</th>
    <th>Marks</th>
    <th>grade</th>
  </tr>
  <tr>
    <td>Science</td>
    <td>Social</td>
    <td>General knowledge</td>
  </tr>
  <tr>
    <td>98</td>
    <td>85</td>
    <td>79</td>
  </tr>
</table>

<p>To understand the example better, we have added borders to the table.</p>

</body>
</html>
    </body>
</html>
