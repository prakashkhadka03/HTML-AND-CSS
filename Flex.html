<!doctype html>
<html>
  <head>
    <title>CSS Flexbox Layout</title>
    <style>
      .container {
        display: flex;
        background-color: #d4f73b;
        height: 80px;
      }
      .container > div {
        background-color: #f1f1f1;
        width: 100px;
        margin: 5px;
        padding: 10px;
        text-align: center;
        font-size: 20px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div>Home page</div>
      <div>programms</div>
      <div>Faculty and staff</div>
      <div>Contact us</div>
      <div>About us</div>
      <div>News</div>
      <div>Events</div>
    </div>
  </body>
</html>
